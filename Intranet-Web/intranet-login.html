<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Intranet | In Hole Solutions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-slide { animation: fadeSlide 0.35s ease-out; }
  </style>
</head>
<body class="min-h-screen flex">

  <!-- ── Panel izquierdo (solo md+) ── -->
  <div class="hidden md:flex md:w-1/2 lg:w-2/5 bg-[#e31e24] relative overflow-hidden flex-col items-center justify-center p-12">
    <!-- Círculos decorativos -->
    <div class="absolute -top-16 -left-16 w-72 h-72 rounded-full border-[50px] border-white/5"></div>
    <div class="absolute -bottom-20 -right-20 w-96 h-96 rounded-full border-[60px] border-white/5"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] rounded-full bg-white/5 blur-3xl pointer-events-none"></div>

    <div class="relative z-10 text-center text-white">
      <img src="../assets/images/logo/logo-dark.svg" alt="In Hole Solutions"
           onerror="this.src='../assets/images/logo/logo-dark.png'"
           class="h-20 w-auto mx-auto mb-10 brightness-0 invert">
      <h1 class="text-2xl lg:text-3xl font-bold tracking-tight mb-3">Intranet Corporativa</h1>
      <p class="text-sm text-white/70 leading-relaxed max-w-xs mx-auto">
        Plataforma interna de In Hole Solutions. Acceso exclusivo para personal autorizado.
      </p>
      <div class="flex flex-wrap gap-2 justify-center mt-8">
        <span class="bg-white/15 border border-white/20 text-white text-[10px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-full">QHSE</span>
        <span class="bg-white/15 border border-white/20 text-white text-[10px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-full">Operaciones</span>
        <span class="bg-white/15 border border-white/20 text-white text-[10px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-full">Políticas</span>
      </div>
    </div>
  </div>

  <!-- ── Panel derecho: formulario ── -->
  <div class="flex-1 flex items-center justify-center bg-slate-50 p-4 sm:p-8 min-h-screen md:min-h-0">
    <div class="bg-white rounded-2xl shadow-xl border border-slate-100 w-full max-w-md p-6 sm:p-10">

      <!-- Logo solo en móvil -->
      <div class="flex justify-center mb-8 md:hidden">
        <img src="../assets/images/logo/logo-dark.svg" alt="In Hole Solutions"
             onerror="this.src='../assets/images/logo/logo-dark.png'"
             class="h-14 w-auto">
      </div>

      <div class="mb-7">
        <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Bienvenido</h2>
        <p class="text-slate-400 text-sm mt-1">Introduce tu información de acceso</p>
      </div>

      <!-- Mensaje de estado -->
      <div id="status-msg" class="hidden fade-slide mb-5"></div>

      <!-- Formulario -->
      <form id="loginForm" class="space-y-5">

        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Correo Electrónico</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 text-sm pointer-events-none">
              <i class="fas fa-envelope"></i>
            </span>
            <input type="email" id="email" required autocomplete="email"
              placeholder="usuario@inholesolutions.com"
              class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl bg-slate-50 text-slate-800 text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-[#e31e24] transition duration-200">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Contraseña</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 text-sm pointer-events-none">
              <i class="fas fa-lock"></i>
            </span>
            <input type="password" id="password" required autocomplete="current-password"
              placeholder="••••••••"
              class="w-full pl-10 pr-10 py-3 border border-slate-200 rounded-xl bg-slate-50 text-slate-800 text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-[#e31e24] transition duration-200">
            <button type="button" id="togglePassword"
              class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 hover:text-[#e31e24] transition-colors duration-200">
              <i class="fas fa-eye text-sm" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" id="submitBtn"
          class="w-full bg-[#e31e24] hover:bg-[#b3161b] active:scale-95 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-red-200 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed mt-1">
          <span id="btnText">Ingresar</span>
        </button>

      </form>

      <div class="border-t border-slate-100 mt-7 pt-6 text-center">
        <a href="mailto:administracion@inhole.com?subject=Recuperación de Contraseña Intranet&body=Solicito el restablecimiento de mi contraseña de acceso."
          class="text-xs text-slate-400 hover:text-[#e31e24] transition-colors duration-200">
          ¿Olvidaste tu contraseña? <span class="underline">Solicítala aquí</span>
        </a>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script type="module">
    import { supabaseClient } from './Js/supabase-config.js';

    // Toggle contraseña
    document.getElementById('togglePassword').addEventListener('click', () => {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash text-sm';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye text-sm';
      }
    });

    const loginForm = document.getElementById('loginForm');
    const statusMsg = document.getElementById('status-msg');
    const submitBtn = document.getElementById('submitBtn');
    const btnText   = document.getElementById('btnText');

    function showError(texto) {
      statusMsg.className = 'fade-slide mb-5 p-4 rounded-xl text-sm font-bold text-center bg-red-50 text-red-700 border border-red-100';
      statusMsg.innerText = texto;
    }

    function showSuccess(html) {
      statusMsg.className = 'fade-slide mb-5 p-4 rounded-xl bg-emerald-50 border border-emerald-100';
      statusMsg.innerHTML = html;
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      statusMsg.className = 'hidden';
      submitBtn.disabled = true;
      btnText.innerText = 'Verificando...';

      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        // 1. Login
        const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (authError && authError.message.includes('Invalid login credentials')) {
          throw { tipo: 'credenciales_invalidas' };
        }
        if (authError) throw authError;

        // 2. Perfil
        const { data: perfil, error: perfilError } = await supabaseClient
          .from('perfiles').select('*').eq('id', authData.user.id).single();

        if (perfilError || !perfil) {
          await supabaseClient.auth.signOut();
          throw { tipo: 'no_autorizado' };
        }

        // 3. Bienvenida
        loginForm.style.opacity = '0';
        showSuccess(`
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-emerald-100 flex items-center justify-center flex-shrink-0">
              <i class="fas fa-check text-emerald-600 text-xs"></i>
            </div>
            <div>
              <p class="text-emerald-900 font-bold text-sm">Bienvenido, ${perfil.nombre_completo}</p>
              <p class="text-emerald-600 text-xs mt-0.5">${perfil.rol} · Entrando...</p>
            </div>
          </div>
        `);

        localStorage.setItem('user_name', perfil.nombre_completo);
        localStorage.setItem('user_role', perfil.rol);

        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);

      } catch (error) {
        console.error('Error:', error);

        if (error.tipo === 'credenciales_invalidas') {
          showError('CORREO O CONTRASEÑA INCORRECTOS');
        } else if (error.tipo === 'no_autorizado') {
          showError('SOLO PERSONAL AUTORIZADO');
        } else {
          showError('SOLO PERSONAL AUTORIZADO');
        }

        submitBtn.disabled = false;
        btnText.innerText = 'Ingresar';
      }
    });
  </script>

</body>
</html>
