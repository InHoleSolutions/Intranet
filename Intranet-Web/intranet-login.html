<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Intranet | In Hole Solutions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    /* Animación para el mensaje de éxito */
    .fade-in-down {
      animation: fadeInDown 0.4s ease-out forwards;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100 relative overflow-hidden">
    
    <div class="flex justify-center mb-8">
      <img src="../assets/images/logo/logo-dark.svg" alt="In Hole Solutions" class="h-16 w-auto" onerror="this.src='../assets/images/logo/logo-dark.png'">
    </div>

    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-slate-800">Bienvenido</h2>
      <p class="text-slate-500 text-sm mt-2">Introduce tu información de acceso</p>
    </div>

    <div id="status-msg" class="hidden mb-6 p-4 rounded-xl text-sm font-medium border fade-in-down"></div>

    <form id="loginForm" class="space-y-5 transition-opacity duration-300">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Correo Electrónico</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
            <i class="fas fa-envelope"></i>
          </span>
          <input type="email" id="email" required
            class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl leading-5 bg-slate-50 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition duration-200"
            placeholder="usuario@inholesolutions.com">
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Contraseña</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
            <i class="fas fa-lock"></i>
          </span>
          <input type="password" id="password" required
            class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl leading-5 bg-slate-50 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition duration-200"
            placeholder="••••••••">
        </div>
      </div>

      <button type="submit" id="submitBtn"
        class="w-full bg-[#e31e24] hover:bg-[#b3161b] text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-red-200 transition duration-300 transform hover:-translate-y-0.5 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
        <span id="btnText">Ingresar</span>
      </button>
    </form>

    <div class="mt-8 text-center">
      <a href="mailto:administracion@inhole.com?subject=Recuperación de Contraseña Intranet&body=Solicito el restablecimiento de mi contraseña de acceso." 
        class="text-sm font-medium text-slate-500 hover:text-[#e31e24] transition-colors duration-200">
        ¿Olvidaste tu contraseña? <span class="underline">Solicítala aquí</span>
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = 'https://yhdpktwvzwkhqvniwqmr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloZHBrdHd2endraHF2bml3cW1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MDE1MDEsImV4cCI6MjA5NDE3NzUwMX0.QIjoCNFM7YkGxO6lGao7t10gKclohmqgd0JsAGhTFkY';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const loginForm = document.getElementById('loginForm');
    const statusMsg = document.getElementById('status-msg');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Estado de carga inicial
      statusMsg.classList.add('hidden');
      submitBtn.disabled = true;
      btnText.innerText = "Verificando...";
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        // 1. Intentar iniciar sesión
        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password
        });

        if (error) throw error;

        // 2. Obtener perfil
        const { data: perfil } = await supabaseClient
            .from('perfiles')
            .select('nombre_completo')
            .eq('id', data.user.id)
            .single();

        const nombre = perfil ? perfil.nombre_completo : "Usuario";

        // MODIFICACIÓN: Mensaje de Bienvenida Estilizado con Tailwind
        loginForm.classList.add('opacity-0'); // Desvanecemos el formulario
        statusMsg.innerHTML = `
          <div class="flex items-center">
            <div class="flex-shrink-0">
              <i class="fas fa-check-circle text-emerald-500 text-xl"></i>
            </div>
            <div class="ml-3">
              <p class="text-emerald-900 font-bold">¡Acceso Correcto!</p>
              <p class="text-emerald-700 text-xs">Bienvenido, ${nombre}. Redirigiendo...</p>
            </div>
          </div>
        `;
        statusMsg.className = "mb-6 p-4 rounded-xl text-sm block bg-emerald-50 border border-emerald-100 shadow-sm fade-in-down";
        statusMsg.classList.remove('hidden');

        // Redirección con un pequeño delay para apreciar el mensaje
        setTimeout(() => {
          window.location.href = "dashboard.html"; 
        }, 1500);

      } catch (error) {
        // Mensaje de Error Estilizado
        statusMsg.innerText = "SOLO PERSONAL AUTORIZADO";
        statusMsg.className = "mb-6 p-4 rounded-xl text-sm font-bold block bg-red-50 text-red-700 border border-red-100 fade-in-down text-center";
        statusMsg.classList.remove('hidden');
        
        // Reset del botón
        submitBtn.disabled = false;
        btnText.innerText = "Ingresar a la Intranet";
      }
    });
  </script>
</body>
</html>
